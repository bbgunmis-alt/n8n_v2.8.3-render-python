services:
  - type: web
    name: n8n-v2.8.3
    env: docker
    dockerfilePath: ./Dockerfile
    plan: standard
    port: 5678
    healthCheckPath: /
    envVars:
      - key: NODE_ENV
        value: production
      - key: N8N_HOST
        value: 0.0.0.0
      - key: N8N_PORT
        value: 5678
      - key: N8N_PROTOCOL
        value: https
      - key: WEBHOOK_URL
        value: https://n8n-chatbot-6q3s.onrender.com